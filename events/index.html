<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📌 全持仓事件时间轴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--surface:#fff;--border:#e4e6ec;--text:#191c24;--text2:#56606e;--text3:#8e96a6;
  --blue:#1a5cc8;--blue-l:#e8eeff;--purple:#6d28d9;--purple-l:#f0e8ff;
  --green:#059669;--green-l:#e8faf0;--orange:#d97706;--orange-l:#fff3e0;
  --red:#dc2626;--red-l:#ffe8e8;--teal:#0d9488;--teal-l:#e0faf5;
  --amber:#b45309;--amber-l:#fff8e1;--indigo:#4338ca;--indigo-l:#e8ecff;
  --emerald:#047857;--emerald-l:#e0f5ec;--slate:#475569;--slate-l:#f0f2f5;
  --gray:#6b7280;--gray-l:#f3f4f6;--pink:#db2777;--pink-l:#ffe0ec;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --font:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace
}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:0 20px}

/* ===== PASSWORD ===== */
.pw-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.pw-overlay.hidden{opacity:0;pointer-events:none}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px 40px;max-width:380px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.pw-icon{font-size:36px;margin-bottom:8px}
.pw-title{font-size:18px;font-weight:700;margin-bottom:4px}
.pw-sub{font-size:11px;color:var(--text3);margin-bottom:24px}
.pw-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color .15s}
.pw-input:focus{border-color:var(--blue)}
.pw-input::placeholder{color:var(--text3)}
.pw-btn{width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .15s}
.pw-btn:hover{opacity:.85}
.pw-btn:disabled{opacity:.4;cursor:not-allowed}
.pw-err{font-size:11px;color:var(--red);margin-top:10px;min-height:18px}

/* ===== HEADER ===== */
.header{text-align:center;padding:32px 0 8px}
.header h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
.header h1 span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:11px;color:var(--text3);margin-top:2px}
.header .links{font-size:10px;color:var(--text3);margin-top:6px}
.header .links a{color:var(--blue);text-decoration:none}

/* ===== STATS ===== */
.stats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px auto 16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 14px;text-align:center;min-width:48px;box-shadow:var(--shadow)}
.stat .n{font-size:18px;font-weight:700;line-height:1.2}
.stat .l{font-size:8px;color:var(--text3);margin-top:1px}
.stat.s-red .n{color:var(--red)}
.stat.s-orange .n{color:var(--orange)}
.stat.s-blue .n{color:var(--blue)}
.stat.s-green .n{color:var(--green)}

/* ===== LEGEND ===== */
.legend{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:0 auto 16px}
.legend-item{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:var(--text3);padding:3px 10px;border-radius:8px;background:var(--surface);border:1px solid var(--border)}

/* ===== MONTH BAR ===== */
.month-bar{display:flex;gap:0;margin:0 0 20px;padding:0;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow)}
.month-item{flex:1;text-align:center;padding:8px 4px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-right:1px solid var(--border);transition:all .15s;position:relative}
.month-item:last-child{border-right:none}
.month-item:hover{background:var(--gray-l)}
.month-item.active{color:#fff}
.month-item.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;border-radius:2px 2px 0 0}
.month-item .mc{display:block;font-size:8px;font-weight:400;opacity:.7;margin-top:1px}

/* Month colors (gradient of active state) */
.month-item.m7.active{background:var(--pink)}.month-item.m7.active::after{background:var(--pink)}
.month-item.m8.active{background:var(--orange)}.month-item.m8.active::after{background:var(--orange)}
.month-item.m9.active{background:var(--blue)}.month-item.m9.active::after{background:var(--blue)}
.month-item.m10.active{background:var(--purple)}.month-item.m10.active::after{background:var(--purple)}
.month-item.m11.active{background:var(--indigo)}.month-item.m11.active::after{background:var(--indigo)}
.month-item.m12.active{background:var(--gray)}.month-item.m12.active::after{background:var(--gray)}

/* ===== FILTERS ===== */
.filters{display:flex;gap:4px;margin:0 auto 16px;flex-wrap:wrap;justify-content:center}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--surface);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;box-shadow:var(--shadow)}
.filter-btn:hover{border-color:var(--text3)}
.filter-btn.active{border-color:transparent;color:#fff}
.filter-btn.f-all.active{background:var(--text)}
.filter-btn.f-urgent.active{background:var(--red)}
.filter-btn.f-upcoming.active{background:var(--orange)}
.filter-btn.f-monitoring.active{background:var(--gray)}
.filter-btn.f-done.active{background:var(--green)}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 2px}

/* Stock filter dots */
.stock-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:0 auto 12px}
.sdot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .15s;font-size:0;padding:0;flex-shrink:0}
.sdot:hover{opacity:.8;transform:scale(1.12)}
.sdot.active{border-color:var(--text);transform:scale(1.15);box-shadow:0 0 0 2px #fff,0 0 0 4px currentColor}

/* ===== URGENT BAR ===== */
.urgent{background:var(--red-l);border:1px solid var(--red);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.urgent-h{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;font-weight:600;color:var(--red)}
.urgent-b{padding:4px 14px 8px}
.urgent-item{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid var(--red-l)}
.urgent-item:last-child{border-bottom:none}
.urgent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.urgent-date{font-size:9px;color:var(--text3);flex-shrink:0;min-width:50px}
.urgent-title{flex:1;min-width:0}
.urgent-title .ut{font-weight:600}
.urgent-title .us{font-size:9px;color:var(--text3)}
.urgent-badge{font-size:8px;padding:1px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
.urgent-badge.ub-red{color:var(--red);background:var(--red-l)}
.urgent-badge.ub-orange{color:var(--orange);background:var(--orange-l)}

/* ===== TIMELINE ===== */
.tl{position:relative;padding:0 0 20px 24px}
.tl::before{content:'';position:absolute;left:7px;top:12px;bottom:12px;width:2px;background:var(--border);z-index:0}

/* Today marker */
.tl-today{position:relative;margin-bottom:16px;padding-left:24px;text-align:center}
.tl-today-inner{display:inline-flex;align-items:center;gap:6px;background:var(--red-l);border:1px solid var(--red);border-radius:20px;padding:4px 14px 4px 12px;font-size:11px;font-weight:600;color:var(--red)}
.tl-today-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

/* Event card */
.event{position:relative;z-index:1;margin-bottom:10px;display:none}
.event.visible{display:block}
.event.done{opacity:.5}.event.done:hover{opacity:.8}
.event.hidden,.event.hidden-by-stock{display:none}

/* Timeline dot on the left */
.event-dot{position:absolute;left:-20px;top:16px;width:14px;height:14px;border-radius:50%;border:3px solid;background:var(--surface);z-index:2;transition:transform .2s}

/* Importance-based card background colors */
.event-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow);transition:all .15s;position:relative;overflow:hidden}
.event-card:hover{border-color:var(--text3);box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px)}

/* Urgency colors */
.event-card.imp-5{background:var(--red-l);border-color:#f5c6c6}
.event-card.imp-4{background:var(--orange-l);border-color:#f5ddc6}
.event-card.imp-3{background:var(--blue-l);border-color:#c6d4f5}
.event-card.imp-2{background:var(--gray-l);border-color:#ddd}
.event-card.imp-5.done,.event-card.imp-4.done,.event-card.imp-3.done{background:var(--green-l);border-color:#b8e6c8}
.event-card.monitoring{background:var(--surface);border-color:var(--border)}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;margin:0 auto 16px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);max-width:320px}
.tab-btn{flex:1;padding:8px 16px;border:none;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;color:var(--text3);background:transparent;transition:all .15s;position:relative}
.tab-btn:hover{color:var(--text);background:var(--gray-l)}
.tab-btn.active{color:#fff;cursor:default}
.tab-btn.tab-active.active{background:var(--blue)}
.tab-btn.tab-archived.active{background:var(--slate)}

/* Card accent bar */
.event-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}

/* Card top row */
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.card-stock{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 8px 2px 6px;border-radius:10px;line-height:1.3;flex-shrink:0}
.card-stock .sd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.card-date{font-size:9px;color:var(--text3);font-weight:500;flex-shrink:0}
.card-type{font-size:8px;padding:1px 6px;border-radius:6px;font-weight:500;margin-left:auto;flex-shrink:0;color:var(--text3);background:var(--gray-l)}
.card-title{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:3px}
.card-imp{margin-bottom:3px}
.card-imp .stars{font-size:9px;letter-spacing:-1px}
.card-imp .il{font-size:8px;color:var(--text3);margin-left:3px}
.card-impact{margin-bottom:3px}
.impact-b{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:600;padding:1px 8px;border-radius:6px}
.imp-up{color:var(--green);background:var(--green-l)}
.imp-down{color:var(--red);background:var(--red-l)}
.imp-both{color:var(--purple);background:var(--purple-l)}
.imp-neutral{color:var(--text3);background:var(--gray-l)}
.card-desc{font-size:10px;color:var(--text2);line-height:1.5}
.card-detail{margin-top:4px;padding:4px 8px;background:rgba(255,255,255,.6);border-radius:6px;font-size:9px;color:var(--text2);line-height:1.5}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.card-tag{font-size:7px;padding:1px 6px;border-radius:6px;color:var(--text3);background:rgba(255,255,255,.5);font-weight:500}

/* Urgency indicator on card (right edge) */
.card-urgency{position:absolute;top:0;right:0;padding:2px 8px;font-size:8px;font-weight:600;border-radius:0 10px 0 8px}
.card-urgency.u-critical{color:var(--red);background:rgba(220,38,38,.12)}
.card-urgency.u-high{color:var(--orange);background:rgba(217,119,6,.12)}
.card-urgency.u-normal{color:var(--blue);background:rgba(26,92,200,.08)}
.card-urgency.u-done{color:var(--green);background:rgba(5,150,101,.1)}
.card-urgency.u-monitor{color:var(--gray);background:rgba(107,114,128,.08)}

/* ===== EMPTY / FOOTER ===== */
.empty{padding:40px 16px;text-align:center;color:var(--text3);font-size:12px}
.empty .ic{font-size:28px;margin-bottom:6px}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:12px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:s .7s linear infinite;margin:0 auto 6px}
@keyframes s{to{transform:rotate(360deg)}}

.footer{text-align:center;padding:20px 0 28px;font-size:9px;color:var(--text3);line-height:1.8;border-top:1px solid var(--border);margin-top:20px}
.footer a{color:var(--blue);text-decoration:none}

/* ===== STOCK COLOR CLASSES ===== */
/* Accent bar */
.event-card::before{background:var(--gray)}
.event-card.c-blue::before{background:var(--blue)}
.event-card.c-purple::before{background:var(--purple)}
.event-card.c-green::before{background:var(--green)}
.event-card.c-orange::before{background:var(--orange)}
.event-card.c-red::before{background:var(--red)}
.event-card.c-amber::before{background:var(--amber)}
.event-card.c-indigo::before{background:var(--indigo)}
.event-card.c-emerald::before{background:var(--emerald)}
.event-card.c-slate::before{background:var(--slate)}
.event-card.c-teal::before{background:var(--teal)}
.event-card.c-gray::before{background:var(--gray)}

/* Stock badge */
.card-stock.c-blue{color:var(--blue);background:var(--blue-l)}
.card-stock.c-purple{color:var(--purple);background:var(--purple-l)}
.card-stock.c-green{color:var(--green);background:var(--green-l)}
.card-stock.c-orange{color:var(--orange);background:var(--orange-l)}
.card-stock.c-red{color:var(--red);background:var(--red-l)}
.card-stock.c-amber{color:var(--amber);background:var(--amber-l)}
.card-stock.c-indigo{color:var(--indigo);background:var(--indigo-l)}
.card-stock.c-emerald{color:var(--emerald);background:var(--emerald-l)}
.card-stock.c-slate{color:var(--slate);background:var(--slate-l)}
.card-stock.c-teal{color:var(--teal);background:var(--teal-l)}
.card-stock.c-gray{color:var(--gray);background:var(--gray-l)}
.card-stock .sd.c-blue{background:var(--blue)}
.card-stock .sd.c-purple{background:var(--purple)}
.card-stock .sd.c-green{background:var(--green)}
.card-stock .sd.c-orange{background:var(--orange)}
.card-stock .sd.c-red{background:var(--red)}
.card-stock .sd.c-amber{background:var(--amber)}
.card-stock .sd.c-indigo{background:var(--indigo)}
.card-stock .sd.c-emerald{background:var(--emerald)}
.card-stock .sd.c-slate{background:var(--slate)}
.card-stock .sd.c-teal{background:var(--teal)}
.card-stock .sd.c-gray{background:var(--gray)}

/* Event dot */
.event-dot.c-blue{border-color:var(--blue)}
.event-dot.c-purple{border-color:var(--purple)}
.event-dot.c-green{border-color:var(--green)}
.event-dot.c-orange{border-color:var(--orange)}
.event-dot.c-red{border-color:var(--red)}
.event-dot.c-amber{border-color:var(--amber)}
.event-dot.c-indigo{border-color:var(--indigo)}
.event-dot.c-emerald{border-color:var(--emerald)}
.event-dot.c-slate{border-color:var(--slate)}
.event-dot.c-teal{border-color:var(--teal)}
.event-dot.c-gray{border-color:var(--gray)}

/* SDot colors */
.sdot.c-blue{background:var(--blue)}
.sdot.c-purple{background:var(--purple)}
.sdot.c-green{background:var(--green)}
.sdot.c-orange{background:var(--orange)}
.sdot.c-red{background:var(--red)}
.sdot.c-amber{background:var(--amber)}
.sdot.c-indigo{background:var(--indigo)}
.sdot.c-emerald{background:var(--emerald)}
.sdot.c-slate{background:var(--slate)}
.sdot.c-teal{background:var(--teal)}
.sdot.c-gray{background:var(--gray)}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  .container{padding:0 14px}
  .header{padding:24px 0 4px}
  .header h1{font-size:20px}
  .stats{gap:6px}
  .stat{padding:5px 10px;min-width:42px}
  .stat .n{font-size:15px}
  .month-bar{border-radius:8px}
  .month-item{padding:6px 2px;font-size:10px}
  .month-item .mc{font-size:7px}
  .tl{padding:0 0 16px 18px}
  .tl::before{left:5px}
  .event-dot{left:-15px;width:12px;height:12px;border-width:2px;top:14px}
  .event-card{padding:10px 12px}
  .card-title{font-size:12px}
  .stock-dots{gap:3px}
  .sdot{width:20px;height:20px}
  .filter-btn{padding:4px 10px;font-size:9px}
  .legend-item{font-size:8px;padding:2px 8px}
  .urgent-item{font-size:10px}
  .event-card.imp-5{background:var(--red-l)}
}

@media(min-width:820px){
  .container{max-width:860px}
  .header{padding:40px 0 10px}
  .header h1{font-size:28px}
}
</style>
</head>
<body>

<!-- ===== PASSWORD ===== -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-icon">🔒</div>
    <div class="pw-title">全持仓事件时间轴</div>
    <div class="pw-sub">请输入密码查看</div>
    <input class="pw-input" id="pwInput" type="password" placeholder="输入密码…" autocomplete="off" onkeydown="if(event.key==='Enter')pwCheck()">
    <button class="pw-btn" id="pwBtn" onclick="pwCheck()">解锁</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<div class="container" id="main" style="display:none">

  <div class="header">
    <h1>全持仓事件<span>时间轴</span></h1>
    <div class="sub" id="updateInfo">加载中...</div>
    <div class="links"><a href="https://chenyusheng.github.io/daily-briefing/">← 返回主页</a></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsBar"></div>

  <!-- Tabs: Active / Archived -->
  <div class="tabs" id="tabBar">
    <button class="tab-btn tab-active active" onclick="setTab('active')">📋 进行中</button>
    <button class="tab-btn tab-archived" onclick="setTab('archived')">📦 已归档</button>
  </div>

  <!-- Urgent -->
  <div class="urgent" id="urgentBar" style="display:none">
    <div class="urgent-h">🚨 近期关键事件</div>
    <div class="urgent-b" id="urgentList"></div>
  </div>

  <!-- Month bar -->
  <div class="month-bar" id="monthBar"></div>

  <!-- Filters -->
  <div class="filters" id="filterBar">
    <button class="filter-btn f-all active" onclick="setFilter('all')">📋 全部</button>
    <button class="filter-btn f-urgent" onclick="setFilter('urgent')">🔴 关键</button>
    <button class="filter-btn f-upcoming" onclick="setFilter('upcoming')">🟡 即将</button>
    <button class="filter-btn f-monitoring" onclick="setFilter('monitoring')">👁 持续</button>
    <button class="filter-btn f-done" onclick="setFilter('done')">✅ 已完成</button>
    <span class="filter-sep"></span>
  </div>

  <!-- Stock dots -->
  <div class="stock-dots" id="stockDots"></div>

  <!-- Timeline -->
  <div class="tl" id="tlWrap">
    <div class="tl-today" id="tlToday" style="display:none">
      <div class="tl-today-inner"><span class="tl-today-dot"></span> 今天 · <span id="todayDate"></span></div>
    </div>
    <div id="tlContent"><div class="loading"><div class="spinner"></div>加载中...</div></div>
  </div>

  <div class="footer">
    每日8:30自动更新 · <a href="https://chenyusheng.github.io/daily-briefing/">返回主页</a>
  </div>

</div>

<script>
var PW_HASH = 'd9b5f58f0b38198293971865a14074f59eba3e82595becbe86ae51f1d9f1f65e';

function pwCheck() {
  var inp = document.getElementById('pwInput'), btn = document.getElementById('pwBtn'), err = document.getElementById('pwErr');
  var val = inp.value.trim();
  if (!val) { err.textContent = '请输入密码'; return; }
  btn.disabled = true; btn.textContent = '验证中…';
  crypto.subtle.digest('SHA-256', new TextEncoder().encode(val)).then(function(buf) {
    var h = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    if (h === PW_HASH) {
      localStorage.setItem('daily_briefing_auth', '1');
      document.getElementById('pwOverlay').classList.add('hidden');
      document.getElementById('main').style.display = '';
    } else { err.textContent = '密码错误'; btn.disabled = false; btn.textContent = '解锁'; inp.value=''; inp.focus(); }
  });
}
if (localStorage.getItem('daily_briefing_auth') === '1') {
  document.getElementById('pwOverlay').classList.add('hidden');
  document.getElementById('main').style.display = '';
}

// ===== DATA =====
var allEvents = [], allStocks = [];
var curFilter = 'all', curStock = null, curMonth = null, curTab = 'active';

function todayStr() { var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function daysDiff(a, b) { return Math.round((new Date(a)-new Date(b))/86400000); }

function getImportanceBg(ev) {
  if (ev.status === 'monitoring') return 'monitoring';
  if (ev.status === 'done') return 'done';
  return 'imp-' + (ev.importance || 3);
}

function getUrgencyLabel(ev) {
  if (ev.status === 'done') return {text:'✅ 已完成', cls:'u-done'};
  if (ev.importance === 5) return {text:'🔴 关键', cls:'u-critical'};
  if (ev.importance === 4) return {text:'🟠 重要', cls:'u-high'};
  if (ev.status === 'monitoring') return {text:'👁 持续', cls:'u-monitor'};
  return {text:'🔵 普通', cls:'u-normal'};
}

// ===== RENDER =====
function render() {
  var data = allEvents;
  var today = todayStr();

  // Filter
  var filtered = data.filter(function(e) {
    if (curFilter === 'urgent' && e.importance < 4) return false;
    if (curFilter === 'upcoming' && e.status !== 'upcoming') return false;
    if (curFilter === 'monitoring' && e.status !== 'monitoring') return false;
    if (curFilter === 'done' && e.status !== 'done') return false;
    if (curStock && e.stock !== curStock) return false;
    return true;
  });

  // Tab filter: active (进行中) vs archived (已归档)
  filtered = filtered.filter(function(e) {
    var oneDayAgo = new Date();
    oneDayAgo.setDate(oneDayAgo.getDate() - 1);
    var oneDayAgoStr = oneDayAgo.toISOString().substring(0, 10);
    var isExpired = e.date && e.date < oneDayAgoStr && /^\d{4}-\d{2}-\d{2}$/.test(e.date);
    // Also treat 'done' status events as archived
    var isDone = e.status === 'done';
    if (curTab === 'active') return !isExpired && !isDone;
    if (curTab === 'archived') return isExpired || isDone;
    return true;
  });

  // Sort: exact dates first, then by date string
  filtered.sort(function(a,b) {
    var aE = /^\d{4}-\d{2}-\d{2}$/.test(a.date);
    var bE = /^\d{4}-\d{2}-\d{2}$/.test(b.date);
    if (aE && bE) return a.date.localeCompare(b.date);
    if (aE && !bE) return -1;
    if (!aE && bE) return 1;
    if (a.date === '2026-12-31' && b.date !== '2026-12-31') return 1;
    if (b.date === '2026-12-31' && a.date !== '2026-12-31') return -1;
    return a.date.localeCompare(b.date);
  });

  // Today marker
  var hasToday = filtered.some(function(e){return e.date===today;});
  document.getElementById('tlToday').style.display = hasToday ? '' : 'none';
  document.getElementById('todayDate').textContent = today;

  // Update month bar
  var months = {};
  filtered.forEach(function(e) {
    if (e.date && e.date.length >= 7) {
      var m = e.date.substring(0,7);
      months[m] = (months[m]||0) + 1;
    }
  });
  var mBar = document.getElementById('monthBar');
  mBar.innerHTML = '';
  var monthNames = {'2026-07':'7月','2026-08':'8月','2026-09':'9月','2026-10':'10月','2026-11':'11月','2026-12':'12月'};
  Object.keys(monthNames).sort().forEach(function(m) {
    var cnt = months[m]||0;
    var num = m.split('-')[1];
    var el = document.createElement('div');
    el.className = 'month-item m' + num + (curMonth===m?' active':'');
    el.innerHTML = monthNames[m] + '<span class="mc">' + cnt + '个事件</span>';
    el.onclick = function() {
      curMonth = (curMonth===m) ? null : m;
      render();
    };
    mBar.appendChild(el);
  });

  // Apply month filter
  if (curMonth) {
    filtered = filtered.filter(function(e) {
      return e.date && e.date.substring(0,7) === curMonth;
    });
  }

  // Render timeline
  var html = '';
  filtered.forEach(function(e, idx) {
    var isToday = e.date === today;
    var impCls = getImportanceBg(e);
    var urg = getUrgencyLabel(e);
    var stars = '';
    for (var i=0;i<e.importance;i++) stars += '⭐';

    var impactHtml = '';
    var impMap = {up:'⬆️ 利好',down:'⬇️ 利空',both:'🔀 双向',neutral:'➖ 中性'};
    var impClsMap = {up:'imp-up',down:'imp-down',both:'imp-both',neutral:'imp-neutral'};
    if (e.impact_dir && impMap[e.impact_dir]) {
      impactHtml = '<span class="impact-b ' + (impClsMap[e.impact_dir]||'') + '">' + impMap[e.impact_dir] + '</span>';
    }

    var detailHtml = e.detail ? '<div class="card-detail">💡 '+e.detail+'</div>' : '';
    var tagsHtml = e.tags ? '<div class="card-tags">'+e.tags.map(function(t){return '<span class="card-tag">#'+t+'</span>';}).join('')+'</div>' : '';

    var dotCls = isToday ? ' today-dot' : '';
    html += '<div class="event visible" data-date="'+e.date+'" data-status="'+e.status+'" data-stock="'+e.stock+'">'
      + '<div class="event-dot c-'+e.color+dotCls+'"></div>'
      + '<div class="event-card '+impCls+' c-'+e.color+'">'
      + '<div class="card-urgency ' + urg.cls + '">' + urg.text + '</div>'
      + '<div class="card-top">'
      + '<span class="card-stock c-'+e.color+'"><span class="sd c-'+e.color+'"></span> '+e.stock_name+'</span>'
      + '<span class="card-date">' + e.date_label + '</span>'
      + (e.type ? '<span class="card-type">'+e.type+'</span>' : '')
      + '</div>'
      + '<div class="card-title">' + e.title + '</div>'
      + (e.importance ? '<div class="card-imp"><span class="stars">'+stars+'</span><span class="il">'+e.importance+'/5</span></div>' : '')
      + (impactHtml ? '<div class="card-impact">'+impactHtml+'</div>' : '')
      + '<div class="card-desc">' + e.description + '</div>'
      + detailHtml
      + tagsHtml
      + '</div></div>';
  });

  var tl = document.getElementById('tlContent');
  if (!filtered.length) {
    tl.innerHTML = '<div class="empty"><div class="ic">🔍</div>没有匹配的事件</div>';
  } else {
    tl.innerHTML = html;
  }
}

// ===== FILTERS =====
function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.className.indexOf('f-'+f) >= 0);
  });
  render();
}

function setTab(t) {
  curTab = t;
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.className.indexOf('tab-'+t) >= 0);
  });
  render();
}

// ===== STOCK FILTERS =====
function renderStockDots(stocks) {
  var wrap = document.getElementById('stockDots');
  wrap.innerHTML = '';
  stocks.forEach(function(s) {
    var dot = document.createElement('button');
    dot.className = 'sdot c-' + s.color;
    dot.title = s.name;
    dot.textContent = s.name.charAt(0);
    dot.onclick = function() {
      curStock = (curStock === s.id) ? null : s.id;
      document.querySelectorAll('.sdot').forEach(function(d){d.classList.toggle('active', d===dot && curStock);});
      render();
    };
    wrap.appendChild(dot);
  });
}

// ===== INIT =====
fetch('../data/events.json').then(function(r) { if (!r.ok) throw Error('HTTP '+r.status); return r.json(); }).then(function(data) {
  allEvents = data.events || [];
  allStocks = data.stocks || [];

  document.getElementById('updateInfo').textContent = '更新于 ' + (data.updated||'');
  renderStockDots(allStocks);

  // Stats
  var s = data.stats || {};
  document.getElementById('statsBar').innerHTML = ''
    + '<div class="stat s-red"><div class="n">'+(s.critical_events||0)+'</div><div class="l">⏰ 关键</div></div>'
    + '<div class="stat s-orange"><div class="n">'+(s.upcoming_7d||0)+'</div><div class="l">📅 7天</div></div>'
    + '<div class="stat s-blue"><div class="n">'+(s.upcoming_30d||0)+'</div><div class="l">📆 30天</div></div>'
    + '<div class="stat s-green"><div class="n">'+(s.monitoring||0)+'</div><div class="l">👁 持续</div></div>'
    + '<div class="stat s-blue"><div class="n">'+s.total_events+'</div><div class="l">📌 总计</div></div>';

  // Urgent
  var urgent = allEvents.filter(function(e) {
    return e.status === 'upcoming' && e.date && /^\d{4}-\d{2}-\d{2}$/.test(e.date);
  }).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,5);

  if (urgent.length) {
    document.getElementById('urgentBar').style.display = '';
    document.getElementById('urgentList').innerHTML = urgent.map(function(e) {
      var diff = daysDiff(e.date, todayStr());
      var badge = diff <= 3 ? '<span class="urgent-badge ub-red">'+diff+'天后</span>'
        : diff <= 7 ? '<span class="urgent-badge ub-orange">'+diff+'天后</span>'
        : '';
      return '<div class="urgent-item"><span class="urgent-date">'+e.date_label+'</span>'
        + '<span class="urgent-title"><span class="ut">'+e.title+'</span> <span class="us">· '+e.stock_name+'</span></span>'
        + badge + '</div>';
    }).join('');
  }

  render();
}).catch(function(err) {
  document.getElementById('tlContent').innerHTML = '<div class="empty"><div class="ic">⚠️</div>加载失败<div class="esub">'+err.message+'</div></div>';
});
</script>

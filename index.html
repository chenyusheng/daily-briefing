<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📈 晨间速览 · 双战法选股</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#f5f6f8;--surface:#fff;--surface-alt:#f0f1f3;--border:#e2e4e8;--text:#1c1e24;--text-secondary:#58606e;--text-tertiary:#8e96a4;--blue:#2266cc;--blue-light:#e6edf7;--purple:#7c3aed;--purple-light:#f3edff;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.05),0 1px 8px rgba(0,0,0,.03);--font-sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
  .container{max-width:800px;margin:0 auto;padding:0}
  .hero{background:linear-gradient(135deg,#fff,#f4f6fc,#eef2f9);border-bottom:1px solid var(--border);padding:52px 24px 36px;text-align:center}
  .hero-icon{font-size:38px;margin-bottom:6px}
  .hero-title{font-size:28px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
  .hero-sub{font-size:14px;color:var(--text-secondary);max-width:500px;margin:0 auto}
  .hero-info{margin-top:14px;display:flex;justify-content:center;gap:18px;font-size:12px;color:var(--text-tertiary);flex-wrap:wrap}
  .hero-info a{color:var(--text-tertiary);text-decoration:none;transition:color .15s}
  .hero-info a:hover{color:var(--blue)}

  .tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100}
  .tab{flex:1;padding:16px 14px;text-align:center;font-size:14px;font-weight:500;color:var(--text-tertiary);cursor:pointer;border:none;background:none;position:relative;transition:color .2s,background .15s;font-family:var(--font-sans);letter-spacing:.2px}
  .tab:hover{color:var(--text);background:var(--surface-alt)}
  .tab.active{color:var(--text);font-weight:600}
  .tab.active::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:3px;border-radius:3px 3px 0 0}
  .tab.tab-news.active::after{background:var(--blue)}
  .tab.tab-picks.active::after{background:var(--purple)}
  .tab .tab-icon{font-size:16px;margin-right:6px}
  .tab .tab-badge{font-size:11px;font-weight:500;padding:1px 8px;border-radius:12px;margin-left:5px}
  .tab.tab-news .tab-badge{background:var(--blue-light);color:var(--blue)}
  .tab.tab-picks .tab-badge{background:var(--purple-light);color:var(--purple)}

  .tab-content{display:none}
  .tab-content.active{display:block}
  .section{padding:24px 24px}

  .archive{display:flex;flex-direction:column;gap:10px}
  .a-item{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-decoration:none;color:inherit;transition:all .18s;box-shadow:var(--shadow)}
  .a-item:hover{border-color:var(--blue);box-shadow:0 2px 16px rgba(0,102,204,.1);transform:translateY(-1px)}
  .a-left{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .a-date{font-size:16px;font-weight:600;line-height:1.3}
  .a-dow{font-size:12px;color:var(--text-tertiary);line-height:1.3}
  .a-desc{flex:1;min-width:0;font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
  .a-tag{font-size:10px;font-weight:500;padding:3px 12px;border-radius:20px;flex-shrink:0;letter-spacing:.3px}
  .a-tag.blue{color:var(--blue);background:var(--blue-light)}
  .a-tag.purple{color:var(--purple);background:var(--purple-light)}
  .a-arrow{color:var(--text-tertiary);font-size:16px;flex-shrink:0;transition:transform .15s}
  .a-item:hover .a-arrow{color:var(--blue);transform:translateX(3px)}

  .empty{padding:80px 20px;text-align:center;color:var(--text-tertiary);font-size:14px}
  .empty .empty-icon{font-size:42px;margin-bottom:10px;opacity:.5}

  .loading{text-align:center;padding:80px 20px;color:var(--text-tertiary);font-size:13px}
  .loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .footer{text-align:center;padding:22px 24px 32px;font-size:11px;color:var(--text-tertiary);line-height:1.9;border-top:1px solid var(--border-light)}

  @media(max-width:600px){
    .container{max-width:100%}
    .hero{padding:32px 16px 26px}.hero-title{font-size:22px}.hero-sub{font-size:13px}
    .tab{padding:13px 8px;font-size:13px}.tab .tab-icon{margin-right:3px}
    .section{padding:16px 14px}
    .a-item{padding:13px 14px;gap:10px}.a-date{font-size:14px}.a-desc{display:none}
    .empty{padding:60px 14px}
  }
  @media(min-width:1024px){
    .container{max-width:900px}
    .hero{padding:60px 32px 40px}.hero-title{font-size:32px}.hero-sub{font-size:15px;max-width:600px}
    .tab{padding:18px 20px;font-size:15px}
    .section{padding:28px 32px}
    .archive{gap:12px}
    .a-item{padding:18px 24px;gap:18px;border-radius:14px}
    .a-date{font-size:17px}.a-desc{font-size:14px}
    .a-tag{font-size:11px;padding:4px 14px}
    .a-arrow{font-size:18px}
    .footer{padding:28px 32px 38px;font-size:12px}
  }
</style>
</head>
<body>
<div class="container">

<div class="hero">
  <div class="hero-icon">📈</div>
  <div class="hero-title">晨间速览 &amp; 双战法选股</div>
  <div class="hero-sub">每日早8:00 · 隔夜美股 · 宏观 · 加密货币 &nbsp;·&nbsp; 每日18:05 · 冰点反抽 · 龙头主升浪</div>
  <div class="hero-info">
    <span>📰 晨间速览</span>
    <span>📊 双战法选股</span>
    <span>🌙 非高峰运行</span>
    <span><a href="https://github.com/eason-byte/daily-briefing">GitHub</a></span>
    <span><a href="https://19930808.xyz">19930808.xyz</a></span>
  </div>
</div>

<div class="tab-bar">
  <button class="tab tab-news active" onclick="switchTab('news')">
    <span class="tab-icon">📰</span>晨间速览
    <span class="tab-badge" id="newsCount">0</span>
  </button>
  <button class="tab tab-picks" onclick="switchTab('picks')">
    <span class="tab-icon">📊</span>双战法选股
    <span class="tab-badge" id="picksCount">0</span>
  </button>
</div>

<div id="tabNews" class="tab-content active">
  <div class="section"><div id="briefingList"></div></div>
</div>
<div id="tabPicks" class="tab-content">
  <div class="section"><div id="stockpickList"></div></div>
</div>

<div class="footer">
  数据源：RSS 19源 · CoinGecko · Yahoo Finance · Tushare Pro · AKShare · 东方财富<br>
  晨间速览早8:00 CST · 双战法选股18:05 CST · deepseek-v4-pro · 非高峰时段<br>
  ⚠️ 仅供参考，不构成投资建议 &nbsp;·&nbsp; <a href="https://19930808.xyz" style="color:var(--blue);text-decoration:none">19930808.xyz</a>
</div>

</div>

<script>
function renderList(containerId, data, prefix, tagClass, tagText) {
  const list = document.getElementById(containerId);
  if (!data || !data.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无记录</div>';
    return;
  }
  const seen = {};
  const unique = data.filter(b => { if (seen[b.date]) return false; seen[b.date] = true; return true; });
  list.innerHTML = '<div class="archive">' + unique.sort((a,b)=>b.date.localeCompare(a.date)).map(b =>
    `<a class="a-item" href="${prefix}${b.date}.html">
      <div class="a-left"><div><div class="a-date">${b.date}</div><div class="a-dow">${b.dow}</div></div></div>
      <div class="a-desc">${b.desc || ''}</div>
      <span class="a-tag ${tagClass}">${tagText}</span>
      <span class="a-arrow">→</span>
    </a>`
  ).join('') + '</div>';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-' + name).classList.add('active');
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  try { localStorage.setItem('briefingTab', name); } catch(e) {}
}

// Load data from JSON
['briefingList','stockpickList'].forEach(id => {
  document.getElementById(id).innerHTML = '<div class="loading"><div class="spinner"></div><br>加载中...</div>';
});

fetch('data.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(d => {
    renderList('briefingList', d.briefings, '', 'blue', '最新');
    renderList('stockpickList', d.stockpicks, 'stock-picks/', 'purple', '分析');
    document.getElementById('newsCount').textContent = (d.briefings || []).length;
    document.getElementById('picksCount').textContent = (d.stockpicks || []).length;
  })
  .catch(e => {
    document.getElementById('briefingList').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div>数据加载失败<br><span style="font-size:11px">' + e.message + '</span></div>';
    document.getElementById('stockpickList').innerHTML = '';
  });

try { const s = localStorage.getItem('briefingTab'); if (s && s !== 'news') switchTab(s); } catch(e) {}
</script>
</body>
</html>
